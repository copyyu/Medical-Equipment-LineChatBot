name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Check mock freshness
        run: |
          go run github.com/vektra/mockery/v2@latest
          if [ -n "$(git diff --name-only)" ]; then
            echo "❌ Mock files are stale! Run 'go run github.com/vektra/mockery/v2@latest' locally and commit the results."
            git diff --stat
            exit 1
          fi
          echo "✅ Mock files are up-to-date"

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./... -v -count=1
