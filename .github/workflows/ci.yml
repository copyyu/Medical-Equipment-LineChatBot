name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Check formatting (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "❌ These files are not gofmt-formatted (run 'gofmt -w .'):"
            echo "$unformatted"
            exit 1
          fi
          echo "✅ gofmt clean"

      - name: Static analysis (go vet)
        run: go vet ./...

      - name: Check mock freshness
        run: |
          go run github.com/vektra/mockery/v2@latest
          if [ -n "$(git diff --name-only)" ]; then
            echo "❌ Mock files are stale! Run 'go run github.com/vektra/mockery/v2@latest' locally and commit the results."
            git diff --stat
            exit 1
          fi
          echo "✅ Mock files are up-to-date"

      - name: Build
        run: go build ./...

      - name: Run tests (race detector + coverage)
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Vulnerability scan (govulncheck)
        # Non-blocking for now: surfaces known vulnerabilities in dependencies
        # without failing the build. Remove continue-on-error to make it a gate.
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medical_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/medical_test?sslmode=disable
        run: go test -tags=integration -count=1 ./...
